<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康源出貨系統 V3.1</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/manage.css">
    <link rel="stylesheet" href="css/history.css">
    <link rel="stylesheet" href="css/modal.css">
</head>

<body>

<header class="header">
    ꔛ康源出貨系統ꔛ
</header>

<nav class="tabs">
    <button class="tab active" data-page="deliveryPage">今日出貨</button>
    <button class="tab" data-page="productManagePage">商品管理</button>
    <button class="tab" data-page="customerManagePage">客戶管理</button>
    <button class="tab" data-page="historyPage">歷史紀錄</button>
    <button class="tab" data-page="statsPage">數據統計</button>
</nav>

<main>

    <section id="deliveryPage" class="page active-page">

        <section class="card">
            <h2>👤 客戶選擇</h2>

            <div id="currentCustomerBox" class="current-customer">
                目前客戶：尚未選擇
            </div>

            <h3 class="sub-title">⭐ 熱門客戶</h3>

            <div id="hotCustomerGrid" class="customer-grid"></div>

            <select id="customerSelect"></select>

            <button id="addCustomerBtn" class="manage-btn">
                ＋ 新增客戶
            </button>
        </section>

        <section class="card">
            <h2>🥬 商品選擇</h2>

            <input
                id="productSearch"
                type="text"
                placeholder="🔍 搜尋商品..."
            >

            <div id="recentProductsSection" class="recent-section">
                <h3 class="sub-title">⭐ 最近使用商品</h3>
                <div id="recentProductGrid" class="product-grid"></div>
            </div>

            <div class="category-bar">

                <button class="category-btn active" data-category="all">全部</button>
                <button class="category-btn" data-category="vegetables">🥬</button>
                <button class="category-btn" data-category="mushrooms">🍄</button>
                <button class="category-btn" data-category="meat">🥩</button>
                <button class="category-btn" data-category="tofu">🥚</button>
                <button class="category-btn" data-category="fruits">🍎</button>
                <button class="category-btn" data-category="processed">🥫</button>
                <button class="category-btn" data-category="other">📦</button>

            </div>

            <div class="product-grid" id="productGrid"></div>
        </section>

        <section class="card">
            <h2>📦 出貨清單</h2>

            <div id="orderList">
                尚未加入商品
            </div>
        </section>

    </section>

    <section id="productManagePage" class="page">

        <section class="card">

            <h2>🛠 商品管理</h2>

            <input
                id="newProductName"
                placeholder="輸入新商品名稱"
            >

            <select id="newProductCategory">
                <option value="vegetables">🥬 蔬菜類</option>
                <option value="mushrooms">🍄 菇類與藻類</option>
                <option value="meat">🥩 肉類與海鮮</option>
                <option value="tofu">🥚 豆製品與蛋類</option>
                <option value="fruits">🍎 水果類</option>
                <option value="processed">🥫 加工製品</option>
                <option value="other">📦 其他</option>
            </select>

            <button id="addProductBtn" class="manage-btn">
                ＋ 新增商品
            </button>

            <hr class="soft-line">

            <h3>📦 商品列表</h3>

            <div id="manageProductList"></div>

        </section>

    </section>

    <section id="customerManagePage" class="page">

        <section class="card">

            <h2>👤 客戶管理</h2>

            <input
                id="newCustomerName"
                placeholder="輸入新客戶名稱"
            >

            <button id="addCustomerManageBtn" class="manage-btn">
                ＋ 新增客戶
            </button>

            <hr class="soft-line">

            <h3>📋 客戶列表</h3>

            <div id="manageCustomerList"></div>

        </section>

    </section>

    <section id="historyPage" class="page">

        <section class="card">

            <h2>📜 歷史出貨紀錄</h2>

            <input
                id="historySearch"
                type="text"
                placeholder="🔍 搜尋客戶、商品、日期、金額..."
            >

            <div class="history-filter">

                <button class="history-filter-btn active" data-filter="all">
                    全部
                </button>

                <button class="history-filter-btn" data-filter="today">
                    今日
                </button>

                <button class="history-filter-btn" data-filter="week">
                    本週
                </button>

                <button class="history-filter-btn" data-filter="month">
                    本月
                </button>

            </div>

            <div id="historyList"></div>

        </section>

    </section>

    <section id="statsPage" class="page">

        <section class="card">

            <h2>📤 資料匯出</h2>

            <button id="exportAllBtn" class="manage-btn">📤 匯出全部</button>
            <button id="exportTodayBtn" class="manage-btn">📤 匯出今日</button>
            <button id="exportMonthBtn" class="manage-btn">📤 匯出本月</button>

        </section>

        <section class="card">
            <h2>📊 月報表</h2>
            <div id="monthReport">載入中...</div>
        </section>

        <section class="card">
            <h2>💰 營收統計</h2>
            <div id="todayStats">
                出貨筆數：0<br>
                今日營收：$0
            </div>
            <div id="monthStats">
                本月營收：$0
            </div>
        </section>

        <section class="card">
            <h2>🏆 今日客戶排行</h2>
            <div id="customerRanking">尚無資料</div>
        </section>

        <section class="card">
            <h2>🏆 本月客戶排行</h2>
            <div id="monthCustomerRanking">尚無資料</div>
        </section>

        <section class="card">
            <h2>🏆 今日熱銷商品</h2>
            <div id="productRanking">尚無資料</div>
        </section>

        <section class="card">
            <h2>🏆 本月熱銷商品</h2>
            <div id="monthProductRanking">尚無資料</div>
        </section>

    </section>

    <div id="productModal" class="modal">

        <div class="modal-content">

            <h2 id="modalTitle">商品</h2>

            <select id="priceModeInput">
                <option value="fixed">固定單價</option>
                <option value="weight">秤重計價</option>
            </select>

            <input id="qtyInput" type="number" placeholder="數量，可填可不填">

            <select id="unitInput">
                <option>斤</option>
                <option>公斤</option>
                <option>公克</option>
                <option>個</option>
                <option>件</option>
                <option>箱</option>
                <option>株</option>
                <option>把</option>
                <option>籃</option>
                <option selected>包</option>
                <option>顆</option>
                <option>罐</option>
                <option>條</option>
                <option>盒</option>
                <option>副</option>
            </select>

            <input id="unitPriceInput" type="number" placeholder="單價">
            <input id="amountInput" type="number" placeholder="金額">
            <input id="weightInput" placeholder="重量，例：2-3 代表2斤3兩">
            <input id="remarkInput" placeholder="備註">

            <div class="modal-buttons">

                <button id="cancelBtn">取消</button>
                <button id="saveBtn">加入出貨單</button>

            </div>

        </div>

    </div>

    <div id="receiptModal" class="modal">

        <div class="modal-content receipt-modal-content">

            <h2>📦 出貨單預覽</h2>

            <label class="field-label">出貨日期</label>

            <input id="shipDateInput" type="date">

            <div id="receiptPreview" class="receipt-preview"></div>

            <div class="modal-buttons receipt-buttons">

                <button id="receiptCancelBtn">返回修改</button>
                <button id="copyReceiptBtn">複製出貨單</button>
                <button id="downloadReceiptImageBtn">產生長圖</button>
                <button id="confirmCheckoutBtn">確認出貨</button>

            </div>

        </div>

    </div>

</main>

<footer class="footer">

    <div class="total">
        合計：$0
    </div>

    <button class="checkout" id="checkoutBtn">
        完成出貨
    </button>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script src="data.js"></script>
<script src="supabase.js"></script>

<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/customer.js"></script>
<script src="js/product.js"></script>
<script src="js/order.js"></script>
<script src="js/receipt.js"></script>
<script src="js/history.js"></script>
<script src="js/stats.js"></script>
<script src="js/export.js"></script>
<script src="js/events.js"></script>
<script src="js/main.js"></script>

</body>
</html>
